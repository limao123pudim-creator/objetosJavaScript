<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Object-oriented JavaScript example</title>
  </head>

  <body>
    <p>This example requires you to enter commands in your browser's JavaScript console (see <a href="https://developer.mozilla.org/en-US/docs/Learn/Common_questions/What_are_browser_developer_tools">What are browser developer tools</a> for more information).</p>

    <p>Objetos em JavaScript são estruturas que agrupam dados e funções em uma mesma unidade, permitindo organizar informações de forma mais clara e reutilizável.</p>
    
    <script>
       var pessoa = {
  nome: ["Bob", "Smith"],
  idade: 32,
  sexo: "masculino",
  interesses: ["música", "esquiar"],
  bio: function () {
    alert(
      this.nome[0] +
        " " +
        this.nome[1] +
        " tem " +
        this.idade +
        " anos de idade. Ele gosta de " +
        this.interesses[0] +
        " e " +
        this.interesses[1] +
        ".",
    );
  },
  saudacao: function () {
    alert("Oi! Eu sou " + this.nome[0] + ".");
  },
};
var cachorro = {
  nome: "Rex",
  raca: "Labrador",
  idade: 4,
  cor: "caramelo",
  brinquedos_favoritos: ["bolinha", "osso de borracha"],
  
  latir: function () {
    alert(
      this.nome + 
      " é um " + 
      this.raca + 
      " de " + 
      this.idade + 
      " anos que adora brincar com sua " + 
      this.brinquedos_favoritos[0] + 
      "! Au au!"
    );
  }
};
    </script>
  </body>

</html>
